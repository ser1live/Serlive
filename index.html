<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERDAR · Kozmik Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #030206;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 🌌 KOZMİK ARKA PLAN VE GERÇEKÇİ KARA DELİK KATMANLARI */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 48% 48%, #15051e 0%, #030207 60%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Interstellar Yerçekimsel Işık Bükülme Halkası (Einstein Halkası) */
        .einstein-ring {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 60px 15px #ff7b00, 
                        inset 0 0 40px 10px #ffb700,
                        0 0 120px 30px #7a0099;
            opacity: 0.85;
            animation: pulseGlow 6s ease-in-out infinite alternate;
            top: calc(50% - 160px - 20px); /* Kartın arkasından hafif yukarı kaydırdık */
            left: calc(50% - 160px - 10px);
        }

        /* Akışkan Gaz Diski (Accretion Disk) */
        .accretion-disk {
            position: absolute;
            width: 650px;
            height: 80px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,140,0,0.7) 20%, rgba(150,0,200,0.2) 50%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            transform: rotate(-18deg) scaleX(1.2);
            opacity: 0.9;
            filter: blur(2px);
            box-shadow: 0 0 40px #ff6a00;
            animation: diskRotate 25s linear infinite;
            top: calc(50% - 40px - 20px);
            left: calc(50% - 325px - 10px);
        }

        /* Olay Ufku (Işığı yutan tam karanlık merkez) */
        .event-horizon {
            position: absolute;
            width: 145px;
            height: 145px;
            background: #000000;
            border-radius: 50%;
            box-shadow: 0 0 25px 5px #000000;
            top: calc(50% - 72.5px - 20px);
            left: calc(50% - 72.5px - 10px);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* ✨ ANA KONTEYNER */
        .container {
            max-width: 340px;
            width: 88%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 25px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.25);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(255, 140, 0, 0.5);
        }
        
        h1 {
            font-size: 1.6em;
            margin-bottom: 4px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }
        
        .title-tag {
            font-size: 0.95rem;
            font-weight: 400;
            color: #ff9d42;
            opacity: 0.95;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 15px rgba(255, 110, 0, 0.4);
        }
        
        #bioText {
            font-size: 0.85em;
            margin-bottom: 24px;
            min-height: 20px;
            color: #c0c0c8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .cursor {
            color: #ff8c00;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 📱 Premium Cam Kart */
        .links-card {
            background: rgba(10, 5, 2, 0.25);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            width: 100%;
        }
        
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.005) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04), 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .social-links i {
            font-size: 1.3em;
            width: 28px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        .social-links a.instagram:hover {
            color: #fccc63;
            border-color: rgba(225, 48, 108, 0.3);
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(225, 48, 108, 0.2);
        }

        .social-links a.tiktok:hover {
            color: #ffaa44;
            border-color: rgba(254, 44, 85, 0.3);
            background: linear-gradient(135deg, rgba(254, 44, 85, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(254, 44, 85, 0.2);
        }

        .social-links a.telegram:hover {
            color: #2ea6da;
            border-color: rgba(46, 166, 218, 0.3);
            background: linear-gradient(135deg, rgba(46, 166, 218, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(46, 166, 218, 0.2);
        }
        
        .social-links a:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .social-links a:hover i {
            transform: scale(1.12);
        }

        .pulse-btn {
            animation: buttonPulse 2s infinite;
        }

        /* Animasyon Tanımlamaları */
        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.2); }
            70% { box-shadow: 0 0 0 12px rgba(255, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); }
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.98); opacity: 0.8; filter: blur(1px); }
            100% { transform: scale(1.02); opacity: 0.95; filter: blur(3px); }
        }

        @keyframes diskRotate {
            0% { transform: rotate(-18deg) scaleX(1.2) translateY(0px); }
            50% { transform: rotate(-16deg) scaleX(1.22) translateY(3px); }
            100% { transform: rotate(-18deg) scaleX(1.2) translateY(0px); }
        }
        
        @media (max-width: 480px) {
            .container { max-width: 310px; }
            h1 { font-size: 1.4em; }
            .title-tag { font-size: 0.9rem; }
            .profile-img { width: 105px; height: 105px; }
            .accretion-disk { width: 480px; left: calc(50% - 240px - 10px); }
            .einstein-ring { width: 240px; height: 240px; top: calc(50% - 120px - 20px); left: calc(50% - 120px - 10px); }
            .event-horizon { width: 110px; height: 110px; top: calc(50% - 55px - 20px); left: calc(50% - 55px - 10px); }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="einstein-ring"></div>
        <div class="accretion-disk"></div>
        <div class="event-horizon"></div>
        <canvas id="starsCanvas"></canvas>
    </div>

    <div class="container">
        <img src="1000005493.jpg" alt="SERDAR" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=300&h=300&fit=crop&crop=face';">
        
        <h1>SERDAR</h1>
        <div class="title-tag">✦ Solo Developer ✦</div>
        
        <div id="bioText">
            <span id="dynamicText"></span>
            <span class="cursor">|</span>
        </div>

        <div class="links-card">
            <div class="social-links">
                <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer" class="instagram pulse-btn">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer" class="tiktok">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer" class="telegram">
                    <i class="fab fa-telegram-plane"></i>
                    <span>Telegram</span>
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // --- 1. KOZMİK YILDIZ TOZLARI SİMÜLASYONU (CANVAS 2D) ---
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        const numStars = 90;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Yıldızları oluştur
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 1.5,
                alpha: Math.random(),
                speed: 0.01 + Math.random() * 0.02
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";

            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) {
                    s.speed = -s.speed; // Işıldama (Twinkle) efekti
                }
                ctx.globalAlpha = Math.max(0, s.alpha);
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // --- 2. DAKTİLO EFEKTİ SCRIPT'İ ---
        const dynamicText = document.getElementById('dynamicText');
        const words = [
            "Web Developer 🌐", 
            "Turning ideas into reality 💡", 
            "Focusing on clean code ✨", 
            "Always adapting, always learning 🚀"
        ];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                dynamicText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 30 : 60;
            
            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 400; 
            }
            
            setTimeout(typeEffect, typeSpeed);
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 400);
        });
    </script>
</body>
</html>

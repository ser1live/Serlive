<!DOCTYPE html>
<html lang="tr">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>

    <video autoplay muted loop playsinline id="bg-video">

    <div class="video-overlay"></div>

    <div class="container">

                        CODE. DESIGN. DEPLOY. 🚀
                    </text>
                </svg>
            </div>
            
            <div id="bioText">

        </div>

        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide card-item">
                    <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer">

                </div>

                <div class="swiper-slide card-item">
                    <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer">

                    </a>
                </div>

                <div class="swiper-slide card-item">
                    <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer">
                        <div class="card-content">
                            <img src="tiktok-logo.jpg" alt="TikTok" class="card-brand-img">
                        </div>
                    </a>
                </div>

            </div>
            <div class="swiper-pagination"></div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

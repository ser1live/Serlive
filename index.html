<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERDAR · Kozmik Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020208;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #010103;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .container {
            max-width: 340px;
            width: 88%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 25px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.25);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 45px rgba(255, 140, 0, 0.5);
        }
        
        h1 {
            font-size: 1.6em;
            margin-bottom: 4px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }
        
        .title-tag {
            font-size: 0.95rem;
            font-weight: 400;
            color: #ff9d42;
            opacity: 0.95;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 15px rgba(255, 110, 0, 0.4);
        }
        
        #bioText {
            font-size: 0.85em;
            margin-bottom: 24px;
            min-height: 20px;
            color: #c0c0c8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .cursor {
            color: #ff8c00;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .links-card {
            background: rgba(10, 5, 2, 0.2);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.02);
            width: 100%;
        }
        
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.005) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.04), 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .social-links i {
            font-size: 1.3em;
            width: 28px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        .social-links a.instagram:hover {
            color: #fccc63;
            border-color: rgba(225, 48, 108, 0.3);
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(225, 48, 108, 0.2);
        }

        .social-links a.tiktok:hover {
            color: #ffaa44;
            border-color: rgba(254, 44, 85, 0.3);
            background: linear-gradient(135deg, rgba(254, 44, 85, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(254, 44, 85, 0.2);
        }

        .social-links a.telegram:hover {
            color: #2ea6da;
            border-color: rgba(46, 166, 218, 0.3);
            background: linear-gradient(135deg, rgba(46, 166, 218, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(46, 166, 218, 0.2);
        }
        
        .social-links a:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .social-links a:hover i {
            transform: scale(1.12);
        }

        .pulse-btn {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.2); }
            70% { box-shadow: 0 0 0 12px rgba(255, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0); }
        }
        
        @media (max-width: 480px) {
            .container { max-width: 310px; }
            h1 { font-size: 1.4em; }
            .title-tag { font-size: 0.9rem; }
            .profile-img { width: 105px; height: 105px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="container">
        <!-- KENDİ FOTOĞRAFINI EKLE: dosya adını "1000005493.jpg" olarak değiştir -->
        <img src="1000005493.jpg" alt="SERDAR" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=300&h=300&fit=crop&crop=face';">
        
        <h1>SERDAR</h1>
        <div class="title-tag">✦ Solo Developer ✦</div>
        
        <div id="bioText">
            <span id="dynamicText"></span>
            <span class="cursor">|</span>
        </div>

        <div class="links-card">
            <div class="social-links">
                <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer" class="instagram pulse-btn">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer" class="tiktok">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer" class="telegram">
                    <i class="fab fa-telegram-plane"></i>
                    <span>Telegram</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        (function(){
            const container = document.getElementById('canvas-container');
            let camera, scene, renderer, material;
            const startTime = Date.now();

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform vec2 u_resolution;
                uniform float u_time;
                varying vec2 vUv;

                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
                }

                void main() {
                    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
                    
                    uv -= vec2(0.05, 0.05);

                    float angle = -0.3;
                    mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
                    vec2 uvRot = rot * uv;

                    float r = length(uv);
                    float theta = atan(uvRot.y, uvRot.x);

                    float holeRadius = 0.14;
                    if (r < holeRadius) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    float lensing = 1.0 / (r - holeRadius + 0.015);
                    float diskSample = abs(uvRot.y) * 14.0 * (r * 2.0);
                    float disk = exp(-diskSample * diskSample);
                    
                    float ringWidth = 0.02;
                    float ringDist = abs(r - 0.22);
                    float ring = exp(-pow(ringDist/ringWidth, 2.0)) * 2.0;

                    float speed = u_time * 0.9;
                    float dynamicNoise = sin(theta * 14.0 - speed) * 0.3 + cos(r * 35.0 - speed * 0.6) * 0.25;
                    
                    float finalIntensity = (disk * 3.5 / (r * 1.8 + 0.08)) + (ring * 1.8);
                    finalIntensity += dynamicNoise * disk * 0.7;

                    vec3 coreColor = vec3(1.0, 0.98, 0.92);
                    vec3 orangePlaza = vec3(1.0, 0.6, 0.15);
                    vec3 deepPurple = vec3(0.6, 0.1, 0.45);

                    vec3 finalColor = mix(orangePlaza, coreColor, clamp(finalIntensity * 0.35, 0.0, 1.0));
                    finalColor = mix(deepPurple, finalColor, clamp(finalIntensity * 0.9, 0.0, 1.0));
                    finalColor *= finalIntensity * 2.0;

                    float starfield = hash(uv * 900.0 + floor(u_time * 0.04)) * 0.12;
                    finalColor += vec3(0.3, 0.2, 0.4) * starfield;

                    // Dışa doğru parlaklık azalması
                    finalColor *= (1.0 - r * 0.25);

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            function init() {
                scene = new THREE.Scene();
                camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

                const geometry = new THREE.PlaneGeometry(2, 2);
                
                material = new THREE.ShaderMaterial({
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    uniforms: {
                        u_time: { value: 0.0 },
                        u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                    }
                });

                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);

                renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                window.addEventListener('resize', onWindowResize);
            }

            function onWindowResize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                renderer.setSize(w, h);
                material.uniforms.u_resolution.value.set(w, h);
            }

            function animate() {
                requestAnimationFrame(animate);
                material.uniforms.u_time.value = (Date.now() - startTime) * 0.001;
                renderer.render(scene, camera);
            }

            init();
            animate();

            // DAKTİLO YAZI
            const dynamicText = document.getElementById('dynamicText');
            const words = [
                "Web Developer 🌐", 
                "Turning ideas into reality 💡", 
                "Focusing on clean code ✨", 
                "Always adapting, always learning 🚀"
            ];
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            
            function typeEffect() {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    dynamicText.textContent = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                }
                
                let typeSpeed = isDeleting ? 30 : 60;
                
                if (!isDeleting && charIndex === currentWord.length) {
                    typeSpeed = 2000;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 400; 
                }
                
                setTimeout(typeEffect, typeSpeed);
            }
            
            if (document.readyState === 'complete') {
                setTimeout(typeEffect, 400);
            } else {
                window.addEventListener('load', () => {
                    setTimeout(typeEffect, 400);
                });
            }
        })();
    </script>
</body>
</html>

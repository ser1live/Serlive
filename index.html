<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERDAR - Kişisel Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020208;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 🌊 GERÇEK 3D DALGALI PARÇACIK TUVALI */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #020208 0%, #050515 100%);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* ✨ ANA KONTEYNER */
        .container {
            max-width: 340px;
            width: 88%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
            will-change: transform, opacity;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 25px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        /* Profil Resmi */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(0, 242, 254, 0.35);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.5);
        }
        
        /* ✨ KÜÇÜLTÜLMÜŞ İSİM ALANI */
        h1 {
            font-size: 1.6em; /* Daha kibar durması için boyutu küçültüldü */
            margin-bottom: 4px;
            font-weight: 600;
            color: #00f2fe;
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }
        
        /* Sabit Ünvan */
        .title-tag {
            font-size: 0.95rem;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.9;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        /* Alt Hareketli Yazı Alanı */
        #bioText {
            font-size: 0.85em;
            margin-bottom: 24px;
            min-height: 20px;
            color: #b0b0b5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .cursor {
            color: #00f2fe;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 📱 Alt premium cam kart */
        .links-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.02);
            width: 100%;
        }
        
        /* Dikey Sosyal Link Listesi */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        
        /* Cam Butonlar */
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08), 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .social-links i {
            font-size: 1.3em;
            width: 28px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        /* Hover Marka Renkleri */
        .social-links a.instagram:hover {
            color: #fccc63;
            border-color: rgba(225, 48, 108, 0.4);
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(225, 48, 108, 0.2);
        }

        .social-links a.tiktok:hover {
            color: #00f2fe;
            border-color: rgba(254, 44, 85, 0.4);
            background: linear-gradient(135deg, rgba(254, 44, 85, 0.08) 0%, rgba(0, 242, 254, 0.03) 100%);
            box-shadow: 0 12px 30px rgba(254, 44, 85, 0.2);
        }

        .social-links a.telegram:hover {
            color: #2ea6da;
            border-color: rgba(46, 166, 218, 0.4);
            background: linear-gradient(135deg, rgba(46, 166, 218, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(46, 166, 218, 0.2);
        }
        
        .social-links a:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .social-links a:hover i {
            transform: scale(1.12);
        }

        /* İlk Buton Nabız Efekti */
        .pulse-btn {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.25); }
            70% { box-shadow: 0 0 0 12px rgba(0, 242, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }
        
        /* Mobil Ekran İyileştirmesi */
        @media (max-width: 480px) {
            .container { max-width: 310px; }
            h1 { font-size: 1.4em; } /* Mobilde isim boyutu dengelendi */
            .title-tag { font-size: 0.9rem; }
            .profile-img { width: 105px; height: 105px; }
        }
    </style>
</head>
<body>

    <!-- 🌌 Canlı 3D Dalga için Tuval Konteyneri -->
    <div id="canvas-container"></div>

    <div class="container">
        <!-- Profil üst alanı tamamen şeffaf ve havada asılı -->
        <img src="profile.jpg" alt="Profil Fotoğrafı" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=300&h=300&fit=crop&crop=face';">
        
        <h1>SERDAR</h1>
        
        <div class="title-tag">| Solo Developer |</div>
        
        <div id="bioText">
            <span id="dynamicText"></span>
            <span class="cursor">|</span>
        </div>

        <!-- Sadece linkleri koruyan şık cam kutu -->
        <div class="links-card">
            <div class="social-links">
                <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer" class="instagram pulse-btn">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer" class="tiktok">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer" class="telegram">
                    <i class="fab fa-telegram-plane"></i>
                    <span>Telegram</span>
                </a>
            </div>
        </div>
    </div>

    <!-- 3D Parçacık Dalgası Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 1. GERÇEK 3D MATRİS DALGA SİMÜLASYONU (THREE.JS) ---
        const SEPARATION = 45, AMOUNTX = 65, AMOUNTY = 65;
        let container = document.getElementById('canvas-container');
        let camera, scene, renderer, particles;
        let count = 0;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 1000;
            camera.position.y = 400;
            camera.position.x = 100;

            scene = new THREE.Scene();

            const numParticles = AMOUNTX * AMOUNTY;
            const positions = new Float32Array(numParticles * 3);
            const colors = new Float32Array(numParticles * 3);

            let i = 0, j = 0;
            const colorBlue = new THREE.Color('#00f2fe');
            const colorPurple = new THREE.Color('#9d00ff');

            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    positions[i] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2);
                    positions[i + 1] = 0;
                    positions[i + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2);

                    const mixRatio = ix / AMOUNTX;
                    const mixedColor = colorBlue.clone().lerp(colorPurple, mixRatio);

                    colors[j] = mixedColor.r;
                    colors[j + 1] = mixedColor.g;
                    colors[j + 2] = mixedColor.b;

                    i += 3;
                    j += 3;
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 3.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const positions = particles.geometry.attributes.position.array;
            let i = 0;

            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    positions[i + 1] = (Math.sin((ix + count) * 0.2) * 60) +
                                       (Math.sin((iy + count) * 0.1) * 60);
                    i += 3;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y = count * 0.03;

            renderer.render(scene, camera);
            count += 0.04;
        }

        // --- 2. DAKTİLO EFEKTİ SCRIPT'İ ---
        const dynamicText = document.getElementById('dynamicText');
        const words = [
            "Web Developer 🌐", 
            "Turning ideas into reality 💡", 
            "Focusing on clean code ✨", 
            "Always adapting, always learning 🚀"
        ];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                dynamicText.textContent = currentWord.substring(0, charIndex + 1);
            }
            
            if (!isDeleting) {
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 30 : 60;
            
            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 400; 
            }
            
            setTimeout(typeEffect, typeSpeed);
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 600);
        });
    </script>
</body>
</html>

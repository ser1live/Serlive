<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERDAR - Kişisel Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020208;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 🌊 GERÇEK 3D DALGALI PARÇACIK TUVALİ */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #020208 0%, #050515 100%);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Premium Cam Kart (Glassmorphism) */
        .container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 45px 35px;
            max-width: 400px;
            width: 92%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.85), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
            will-change: transform, opacity;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 25px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        /* Profil Resmi */
        .profile-img {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            margin: 0 auto 18px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(0, 242, 254, 0.35);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.5);
        }
        
        /* İsim */
        h1 {
            font-size: 2.5em;
            margin-bottom: 6px;
            font-weight: 600;
            color: #00f2fe;
            letter-spacing: 1.5px;
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.35);
        }
        
        /* Sabit Ünvan (Görseldeki Gibi) */
        .title-tag {
            font-size: 1.1em;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.9;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        
        /* Alt Hareketli Yazı Alanı */
        #bioText {
            font-size: 0.9em;
            margin-bottom: 32px;
            min-height: 22px;
            color: #b0b0b5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .cursor {
            color: #00f2fe;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Dikey Sosyal Link Listesi */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        
        /* Cam Butonlar */
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-radius: 16px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08), 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .social-links i {
            font-size: 1.4em;
            width: 32px;
            text-align: left;
            transition: transform 0.3s ease;
        }

        /* Hover Marka Renkleri */
        .social-links a.instagram:hover {
            color: #fccc63;
            border-color: rgba(225, 48, 108, 0.4);
            background: linear-gradient(135deg, rgba(225, 48, 108, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(225, 48, 108, 0.2);
        }

        .social-links a.tiktok:hover {
            color: #00f2fe;
            border-color: rgba(254, 44, 85, 0.4);
            background: linear-gradient(135deg, rgba(254, 44, 85, 0.08) 0%, rgba(0, 242, 254, 0.03) 100%);
            box-shadow: 0 12px 30px rgba(254, 44, 85, 0.2);
        }

        .social-links a.telegram:hover {
            color: #2ea6da;
            border-color: rgba(46, 166, 218, 0.4);
            background: linear-gradient(135deg, rgba(46, 166, 218, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 12px 30px rgba(46, 166, 218, 0.2);
        }
        
        .social-links a:hover {
            transform: translateY(-3px) scale(1.02);
        }

        .social-links a:hover i {
            transform: scale(1.15);
        }

        /* İlk Buton Nabız Efekti */
        .pulse-btn {
            animation: buttonPulse 2s infinite;
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.25); }
            70% { box-shadow: 0 0 0 12px rgba(0, 242, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }
        
        /* Mobil Uyumluluk */
        @media (max-width: 480px) {
            .container { padding: 40px 22px; }
            h1 { font-size: 2.1em; }
            .title-tag { font-size: 1rem; }
            .profile-img { width: 115px; height: 115px; }
        }
    </style>
</head>
<body>

    <!-- 🌌 Canlı 3D Dalga için Tuval Konteyneri -->
    <div id="canvas-container"></div>

    <div class="container">
        <img src="profile.jpg" alt="Profil Fotoğrafı" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=300&h=300&fit=crop&crop=face';">
        
        <h1>SERDAR</h1>
        
        <div class="title-tag">| Solo Developer |</div>
        
        <div id="bioText">
            <span id="dynamicText"></span>
            <span class="cursor">|</span>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer" class="instagram pulse-btn">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer" class="tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer" class="telegram">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <!-- Matematiksel 3D Akışkan Dalga İçin Gerekli Olan Güvenli Kütüphane -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 1. GERÇEK 3D MATRİS DALGA SİMÜLASYONU (THREE.JS) ---
        const SEPARATION = 45, AMOUNTX = 65, AMOUNTY = 65;
        let container = document.getElementById('canvas-container');
        let camera, scene, renderer, particles, particle;
        let count = 0;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
            // Kamerayı görseldeki gibi hafif üstten ve açılı bakacak şekilde konumlandırıyoruz
            camera.position.z = 1000;
            camera.position.y = 400;
            camera.position.x = 100;

            scene = new THREE.Scene();

            const numParticles = AMOUNTX * AMOUNTY;
            const positions = new Float32Array(numParticles * 3);
            const colors = new Float32Array(numParticles * 3);

            let i = 0, j = 0;
            // Görseldeki gibi gradyan geçişi sağlamak için renk kodlarını tanımlıyoruz
            const colorBlue = new THREE.Color('#00f2fe');
            const colorPurple = new THREE.Color('#9d00ff');

            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    positions[i] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2); // x
                    positions[i + 1] = 0; // y
                    positions[i + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2); // z

                    // Noktaların konumuna göre mavi ve mor arası yumuşak geçiş (Görseldeki efekt)
                    const mixRatio = ix / AMOUNTX;
                    const mixedColor = colorBlue.clone().lerp(colorPurple, mixRatio);

                    colors[j] = mixedColor.r;
                    colors[j + 1] = mixedColor.g;
                    colors[j + 2] = mixedColor.b;

                    i += 3;
                    j += 3;
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            // Yumuşak, parlayan ve pürüzsüz yuvarlak noktalar oluşturuyoruz
            const material = new THREE.PointsMaterial({
                size: 3.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.75,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const positions = particles.geometry.attributes.position.array;
            let i = 0;

            // Görseldeki gibi dağ/nehir kıvrımı şeklinde dalgalanma formülü (Sinüs ve Kosinüs dalgaları)
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    positions[i + 1] = (Math.sin((ix + count) * 0.2) * 60) +
                                       (Math.sin((iy + count) * 0.1) * 60);
                    i += 3;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            
            // Arka planın kendi etrafında çok hafif ve asilce dönmesi için açıyı güncelliyoruz
            particles.rotation.y = count * 0.03;

            renderer.render(scene, camera);
            count += 0.04; // Dalga akış hızı (Buradan hızlandırıp yavaşlatabilirsin)
        }


        // --- 2. DAKTİLO EFEKTİ SCRIPT'İ ---
        const dynamicText = document.getElementById('dynamicText');
        const words = [
            "Web Developer 🌐", 
            "Turning ideas into reality 💡", 
            "Focusing on clean code ✨", 
            "Always adapting, always learning 🚀"
        ];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                dynamicText.textContent = currentWord.substring(0, charIndex + 1);
            }
            
            if (!isDeleting) {
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 30 : 60;
            
            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 400; 
            }
            
            setTimeout(typeEffect, typeSpeed);
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 600);
        });
    </script>
</body>
</html>

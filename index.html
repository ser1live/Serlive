<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERDAR - Kişisel Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020612;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 🌌 GÜNCELLENEN GECE ARKA PLANI */
        .night-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #020714 0%, #051329 50%, #010308 100%);
            overflow: hidden;
        }

        /* 🌕 PARLAYAN DOLUNAY */
        .moon {
            position: absolute;
            top: 10%;
            left: 12%;
            width: 85px;
            height: 85px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e1f5fe 60%, #b3e5fc 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.35), 0 0 80px rgba(0, 218, 255, 0.15);
            opacity: 0.85;
            animation: moonPulse 6s ease-in-out infinite alternate;
        }

        @keyframes moonPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.04); opacity: 0.95; }
        }

        /* ⭐ GERÇEK PARLAYAN YILDIZLAR (Instagram'da %100 Görünür) */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff, 0 0 15px #ffffff;
            animation: twinkle 3s infinite ease-in-out;
            will-change: opacity;
        }

        /* Farklı konumlarda ve boyutlarda gerçek parlayan yıldızlar */
        .st-1 { width: 3px; height: 3px; top: 15%; right: 20%; animation-delay: 0s; }
        .st-2 { width: 2px; height: 2px; top: 25%; right: 45%; animation-delay: 0.5s; }
        .st-3 { width: 4px; height: 4px; top: 35%; left: 25%; animation-delay: 1s; box-shadow: 0 0 10px #b3e5fc; }
        .st-4 { width: 2px; height: 2px; top: 8%; right: 10%; animation-delay: 1.5s; }
        .st-5 { width: 3px; height: 3px; top: 45%; right: 15%; animation-delay: 2s; }
        .st-6 { width: 2px; height: 2px; top: 60%; left: 8%; animation-delay: 0.7s; }

        /* Yıldızların Göz Kırpma Animasyonu */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 🪰 UÇUŞAN ATEŞ BÖCEKLERİ */
        .firefly {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #00ffcc 0%, rgba(0,255,150,0) 70%);
            box-shadow: 0 0 12px #00ffcc, 0 0 24px rgba(0,255,200,0.6);
            will-change: transform, opacity;
            transform: translate3d(0,0,0);
        }

        .ff-1 { width: 7px; height: 7px; top: 75%; left: 15%; animation: flyAround1 15s infinite linear; }
        .ff-2 { width: 9px; height: 9px; top: 50%; right: 20%; animation: flyAround2 19s infinite linear; background: #64ffda; box-shadow: 0 0 14px #64ffda; }
        .ff-3 { width: 6px; height: 6px; bottom: 20%; left: 35%; animation: flyAround3 13s infinite linear; }
        .ff-4 { width: 8px; height: 8px; top: 85%; right: 30%; animation: flyAround1 17s infinite linear reverse; }

        @keyframes flyAround1 {
            0% { transform: translate3d(0, 0, 0); opacity: 0.1; }
            30% { transform: translate3d(45px, -70px, 0); opacity: 0.8; }
            70% { transform: translate3d(-25px, -140px, 0); opacity: 0.4; }
            100% { transform: translate3d(15px, -220px, 0); opacity: 0; }
        }

        @keyframes flyAround2 {
            0% { transform: translate3d(0, 0, 0); opacity: 0; }
            40% { transform: translate3d(-55px, -60px, 0); opacity: 0.9; }
            80% { transform: translate3d(35px, -120px, 0); opacity: 0.3; }
            100% { transform: translate3d(-15px, -190px, 0); opacity: 0; }
        }

        @keyframes flyAround3 {
            0% { transform: translate3d(0, 0, 0); opacity: 0.6; }
            50% { transform: translate3d(65px, -50px, 0); opacity: 0.2; }
            100% { transform: translate3d(25px, -110px, 0); opacity: 0.9; }
        }

        /* Container (Aynalı Cam Kart) */
        .container {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 45px 35px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(100, 255, 218, 0.4);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.2);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.5);
        }
        
        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            font-weight: 600;
            color: #64ffda;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.3);
        }
        
        #bioText {
            font-size: 1.05em;
            margin-bottom: 30px;
            opacity: 0.95;
            line-height: 1.6;
            color: #e0e0e0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .cursor {
            color: #64ffda;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .social-links a {
            display: inline-flex;
            align-items: center;
            padding: 14px 26px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .social-links a:hover {
            color: #64ffda;
            border-color: rgba(100, 255, 218, 0.4);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(100, 255, 218, 0.02) 100%);
            transform: scale(1.04) translate3d(0, -2px, 0);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.2), 0 10px 25px rgba(100, 255, 218, 0.15);
        }
        
        .social-links i {
            font-size: 1.3em;
            margin-right: 10px;
        }
        
        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
            h1 { font-size: 2.2em; }
            .profile-img { width: 110px; height: 110px; }
            #bioText { font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div class="night-bg">
        <div class="moon"></div>
        
        <div class="star st-1"></div>
        <div class="star st-2"></div>
        <div class="star st-3"></div>
        <div class="star st-4"></div>
        <div class="star st-5"></div>
        <div class="star st-6"></div>

        <div class="firefly ff-1"></div>
        <div class="firefly ff-2"></div>
        <div class="firefly ff-3"></div>
        <div class="firefly ff-4"></div>
    </div>

    <div class="container">
        <img src="profile.jpg" alt="Profil Fotoğrafı" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&crop=face';">
        <h1>SERDAR</h1>
        
        <p id="bioText">
            <span>| Software Developer |</span>
            <span id="dynamicText" style="color: #64ffda; font-weight: 600;"></span>
            <span class="cursor">|</span>
        </p>

        <div class="social-links">
            <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <script>
        const dynamicText = document.getElementById('dynamicText');
        const words = ["Web Developer 🌐", "Turning ideas into reality 💡", "Focusing on clean code ✨", "Always adapting, always learning 🚀"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                dynamicText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 40 : 80;
            
            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 400; 
            }
            
            setTimeout(typeEffect, typeSpeed);
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 600);
        });
    </script>
</body>
</html>

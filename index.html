<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERDAR - Kişisel Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #03030a; /* Gemini Koyu Altyapısı */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        
        /* INSTAGRAM UYUMLU DINAMIK GEMINI ARKA PLANI */
        .gemini-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #03030a;
            overflow: hidden;
        }

        /* 1. Dalga: Gemini Mavisi - Kendi etrafında akışkan döner */
        .wave-one {
            position: absolute;
            width: 180%;
            height: 180%;
            top: -40%;
            left: -40%;
            border-radius: 42%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, transparent 60%);
            animation: rotateWave 22s linear infinite;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        /* 2. Dalga: Gemini Moru - Ters yöne akarak derinlik verir */
        .wave-two {
            position: absolute;
            width: 200%;
            height: 200%;
            bottom: -50%;
            right: -50%;
            border-radius: 44%;
            background: radial-gradient(circle, rgba(157, 0, 255, 0.09) 0%, transparent 60%);
            animation: rotateWave 28s linear infinite reverse;
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }

        /* Instagram'da %100 çalışan döner dalga animasyonu */
        @keyframes rotateWave {
            0% { transform: translate3d(0,0,0) rotate(0deg); }
            100% { transform: translate3d(0,0,0) rotate(360deg); }
        }

        /* Üst Katman: Instagram dostu pürüzsüz Nokta Matrisi */
        .dot-matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Saydamlık ayarları Instagram tarayıcısına göre optimize edildi */
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1.2px, transparent 1.2px);
            background-size: 11px 11px;
            z-index: 0;
            pointer-events: none;
        }
        
        /* Container (Aynalı Cam Kart) */
        .container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px 35px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, 20px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }
        
        /* Profil resmi */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            border: 3px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            will-change: transform;
        }
        
        .profile-img:hover {
            transform: scale(1.05) translate3d(0, 0, 0);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
        }
        
        /* İsim */
        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            font-weight: 600;
            color: #00f2fe;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }
        
        /* Bio text */
        #bioText {
            font-size: 1.05em;
            margin-bottom: 30px;
            opacity: 0.95;
            line-height: 1.6;
            color: #e0e0e0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        /* Daktilo imleci */
        .cursor {
            color: #00f2fe;
            animation: blink 0.7s infinite;
            will-change: opacity;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Social links */
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        /* iOS Aynalı Cam Düğme Tasarımı */
        .social-links a {
            display: inline-flex;
            align-items: center;
            padding: 14px 26px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 4px 15px rgba(0, 0, 0, 0.2);
            will-change: transform;
            transform: translate3d(0, 0, 0);
        }
        
        /* iOS Premium Hover Durumu */
        .social-links a:hover {
            color: #00f2fe;
            border-color: rgba(0, 242, 254, 0.5);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(0, 242, 254, 0.04) 100%);
            transform: scale(1.04) translate3d(0, -2px, 0);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3), 0 10px 25px rgba(0, 242, 254, 0.25);
        }
        
        .social-links i {
            font-size: 1.3em;
            margin-right: 10px;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 35px 25px; }
            h1 { font-size: 2.2em; }
            .profile-img { width: 110px; height: 110px; }
            #bioText { font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div class="gemini-bg">
        <div class="wave-one"></div>
        <div class="wave-two"></div>
        <div class="dot-matrix"></div> </div>

    <div class="container">
        <img src="profile.jpg" alt="Profil Fotoğrafı" class="profile-img" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&h=300&fit=crop&crop=face';">
        <h1>SERDAR</h1>
        
        <p id="bioText">
            <span>| Software Developer |</span>
            <span id="dynamicText" style="color: #00f2fe; font-weight: 600;"></span>
            <span class="cursor">|</span>
        </p>

        <div class="social-links">
            <a href="https://www.instagram.com/ser_dark_?igsh=MXhzeGY5eDJhMzFxNA==" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@serlive7?_t=ZS-90qic9PtnKp&_r=1" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://t.me/ser1live" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram-plane"></i>
                <span>Telegram</span>
            </a>
        </div>
    </div>

    <script>
        const dynamicText = document.getElementById('dynamicText');
        const words = ["Web Developer 🌐", "Turning ideas into reality 💡", "Focusing on clean code ✨", "Always adapting, always learning 🚀"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeEffect() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                dynamicText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                dynamicText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 40 : 80;
            
            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 400; 
            }
            
            setTimeout(typeEffect, typeSpeed);
        }
        
        window.addEventListener('load', () => {
            setTimeout(typeEffect, 600);
        });
    </script>
</body>
</html>

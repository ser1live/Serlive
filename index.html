<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERDAR | ULTRA COSMIC AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  overflow:hidden;
  background:black;
  color:white;
}

/* 🌌 SPACE CANVAS */
#space{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* 🕳️ BLACK HOLE CORE */
#core{
  position:fixed;
  left:50%;
  top:50%;
  width:120px;
  height:120px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,#000 20%,#00f2fe33 40%,transparent 70%);
  box-shadow:0 0 80px #00f2fe55;
  animation:pulse 3s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* UI */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

img{
  width:110px;
  border-radius:50%;
  border:2px solid #00f2fe;
  box-shadow:0 0 25px #00f2fe55;
}

h1{
  color:#00f2fe;
  letter-spacing:3px;
  margin-top:10px;
}

.tag{opacity:.7}

/* AI BOX */
#ai{
  margin-top:15px;
  font-size:.85rem;
  opacity:.7;
  min-height:20px;
}

.links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  width:240px;
}

a{
  text-decoration:none;
  color:white;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

a:hover{
  transform:translateY(-2px);
  border-color:#00f2fe;
  background:rgba(0,242,254,0.08);
}
</style>
</head>

<body>

<canvas id="space"></canvas>
<div id="core"></div>

<div class="container">
  <img src="profile.jpg" onerror="this.src='https://i.imgur.com/7k12f3C.png'">
  <h1>SERDAR</h1>
  <div class="tag">ULTRA PRO MAX AI SYSTEM</div>

  <div id="ai"></div>

  <div class="links">
    <a href="#">Instagram</a>
    <a href="#">TikTok</a>
    <a href="#">Telegram</a>
  </div>
</div>

<script>
/* =========================
   🌌 BLACK HOLE ENGINE
========================= */

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

let w,h,stars=[];

function init(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;

  const density = innerWidth<600 ? 120 : 250;

  stars = Array.from({length:density},()=>({
    x:(Math.random()-0.5)*w,
    y:(Math.random()-0.5)*h,
    z:Math.random()*1000
  }));
}
init();
addEventListener("resize",init);

let t=0;

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,w,h);

  const cx=w/2, cy=h/2;
  t+=0.002;

  for(let s of stars){

    // gravity pull
    let dx=cx-(cx+s.x/(s.z*0.001));
    let dy=cy-(cy+s.y/(s.z*0.001));
    let dist=Math.sqrt(dx*dx+dy*dy)+0.001;

    s.x+=dx/dist*0.02;
    s.y+=dy/dist*0.02;

    // spiral orbit (galaxy)
    let rx=s.x*Math.cos(t)-s.y*Math.sin(t);
    let ry=s.x*Math.sin(t)+s.y*Math.cos(t);

    let x=cx+rx/(s.z*0.001);
    let y=cy+ry/(s.z*0.001);

    let size=2 - s.z*0.002;

    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fillStyle="rgba(0,242,254,0.8)";
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

/* =========================
   🤖 AI TYPE SYSTEM
========================= */

const ai=document.getElementById("ai");

const msgs=[
"AI Core Online...",
"Analyzing space-time...",
"Generating identity field...",
"Serdar system stabilized 🚀"
];

let i=0,j=0,del=false;

function type(){
  let w=msgs[i];
  ai.textContent=w.slice(0,j);

  if(!del)j++;
  else j--;

  if(j===w.length){
    del=true;
    setTimeout(type,1200);return;
  }

  if(j===0){
    del=false;
    i=(i+1)%msgs.length;
  }

  setTimeout(type,50);
}
type();
</script>

</body>
</html>
